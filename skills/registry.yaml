        humidity, and daily high/low.
      version: 1.0.0
      source: generated
      filePath: generated/weather.mjs
      inputSchema:
        type: object
        properties:
          latitude:
            type: number
            description: Latitude of location
          longitude:
            type: number
            description: Longitude of location
          timezone:
            type: string
            description: IANA timezone string, e.g. America/Chicago
          location_name:
            type: string
            description: Human-readable location name for display
        required:
