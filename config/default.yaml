ccbuddy:
  data_dir: "./data"
  log_level: "info"

  # --- Users ---
  # Define users and their platform IDs here.
  # Role must be 'admin' or 'chat'.
  # Example:
  # users:
  #   alice:
  #     name: "Alice"
  #     role: "admin"
  #     discord_id: "123456789"
  #     telegram_id: "987654321"
  users: {}

  # --- Agent ---
  agent:
    backend: "sdk"
    model: "sonnet"
    max_concurrent_sessions: 3
    session_timeout_minutes: 30
    queue_max_depth: 10
    queue_timeout_seconds: 120
    rate_limits:
      admin: 30
      trusted: 20
      chat: 10
      system: 20
    default_working_directory: "~"
    admin_skip_permissions: true
    session_cleanup_hours: 24
    pending_input_timeout_minutes: 10
    graceful_shutdown_timeout_seconds: 30
    session_timeout_ms: 3600000
    user_input_timeout_ms: 300000
    max_pause_ms: 604800000        # 7 days — max time a paused session stays before archival
    trusted_allowed_tools:
      - "Read"
      - "Glob"
      - "Grep"
      - "WebSearch"
      - "WebFetch"
      - "AskUserQuestion"
    max_turns: 80
    compaction_threshold: 50
    compaction_summary_tokens: 4000
    codex:
      api_key_env: "OPENAI_API_KEY"
      network_access: true
      default_sandbox: "workspace-write"
    claude_models:
      - "sonnet"
      - "opus"
      - "haiku"
      - "opus[1m]"
      - "sonnet[1m]"
      - "opusplan"
    codex_models:
      - "gpt-5"
      - "gpt-5.4"
      - "o3"
      - "o4-mini"
      - "o3-pro"
  permission_gates:
    enabled: true
    timeout_ms: 300000
    rules:
      - name: "destructive-rm"
        pattern: "rm\\s+-(r|rf|fr)\\s+(?!/tmp)"
        tool: "Bash"
        description: "Recursive delete on non-temp paths"
      - name: "destructive-git"
        pattern: "git\\s+(reset\\s+--hard|checkout\\s+\\.|clean\\s+-f)"
        tool: "Bash"
        description: "Destructive git operations"
      - name: "local-config"
        pattern: "config/local\\.yaml"
        tool: "*"
        description: "Modify local config (contains secrets)"
      - name: "launchctl"
        pattern: "launchctl"
        tool: "Bash"
        description: "LaunchAgent operations"
      - name: "npm-publish"
        pattern: "npm\\s+publish"
        tool: "Bash"
        description: "Package publishing"

  # --- Memory ---
  memory:
    db_path: "./data/memory.sqlite"
    max_context_tokens: 100000
    context_threshold: 0.75
    fresh_tail_count: 32
    leaf_chunk_tokens: 20000
    leaf_target_tokens: 1200
    condensed_target_tokens: 2000
    max_expand_tokens: 4000
    consolidation_cron: "0 3 * * *"
    backup_cron: "0 4 * * *"
    backup_dir: "./data/backups"
    max_backups: 7
    message_retention_days: 30

  # --- Gateway ---
  gateway:
    unknown_user_reply: true

  # --- Platforms ---
  # Configure in config/local.yaml with ${ENV_VAR} for secrets.
  # Example:
  # platforms:
  #   discord:
  #     enabled: true
  #     token: "${DISCORD_BOT_TOKEN}"
  #     channels:
  #       "channel-id":
  #         mode: "all"    # or "mention"
  platforms: {}

  # --- Scheduler ---
  scheduler:
    timezone: "UTC"

  # --- Heartbeat ---
  heartbeat:
    interval_seconds: 60
    checks:
      process: true
      database: true
      agent: true

  # --- Webhooks ---
  webhooks:
    enabled: false
    port: 18800
    # handlers:
    #   github:
    #     path: "/webhooks/github"
    #     secret: "${GITHUB_WEBHOOK_SECRET}"

  # --- Media ---
  media:
    max_file_size_mb: 10
    voice_enabled: false
    tts_max_chars: 500
    allowed_mime_types:
      - "image/jpeg"
      - "image/png"
      - "image/gif"
      - "image/webp"
      - "application/pdf"

  # --- Image Generation ---
  image_generation:
    enabled: false
    # provider: "openai"
    # model: "dall-e-3"

  # --- Skills ---
  skills:
    generated_dir: "./skills/generated"
    sandbox_enabled: true
    require_admin_approval_for_elevated: true
    auto_git_commit: true

  # --- Apple ---
  apple:
    enabled: false

  # --- Dashboard ---
  dashboard:
    enabled: false
    port: 18801
    host: "127.0.0.1"
    auth_token_env: "CCBUDDY_DASHBOARD_TOKEN"
